services:
  - type: web
    name: traffic-sign-backend
    env: python
    pythonVersion: "3.11"
    rootDir: backend
    buildCommand: >
      pip install --upgrade pip setuptools wheel &&
      pip install -r requirements.txt &&
      python download_model.py
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MODEL_URL
        value: "PASTE_YOUR_HUGGINGFACE_URL_HERE"